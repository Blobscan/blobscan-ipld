services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: blobscan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ipld_gnosis
    volumes:
      - postgres_gnosis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blobscan -d ipld_gnosis"]
      interval: 10s
      timeout: 5s
      retries: 5

  ipfs:
    image: ipfs/kubo:latest
    restart: unless-stopped
    environment:
      IPFS_PROFILE: "server,pebbleds"
      GOLOG_LOG_LEVEL: "info"
    volumes:
      - ipfs_shared:/data/ipfs
    ports:
      - "4001:4001"
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5

  gnosis:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    volumes:
      - gnosis_data:/data
      - gnosis_car:/car
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      NETWORK_NAME: gnosis
      BEACON_RPC: "${GNOSIS_BEACON_RPC:?GNOSIS_BEACON_RPC is required}"
      BEACON_RATE_LIMIT: "100"  # Adjust based on your RPC provider's limit (Quicknode: 125 req/s, use ~100)
      BEACON_RATE_BURST: "32"
      BEACON_429_BACKOFF: "1s"
      BACKFILL_EPOCH_WORKERS: "4"  # parallel epoch builders during backfill (default 4)
      POSTGRES_DSN: "postgres://blobscan:${POSTGRES_PASSWORD}@postgres:5432/ipld_gnosis?sslmode=disable"
      IPFS_API_ADDR: "/dns4/ipfs/tcp/5001"
      DATA_DIR: "/data"
      CAR_DIR: "/car"
    command: ["run"]

volumes:
  postgres_gnosis_data:
  gnosis_data:
  gnosis_car:
  ipfs_shared:
    external: true
