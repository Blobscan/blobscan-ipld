services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: blobscan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ipld_sepolia
      POSTGRES_MULTIPLE_DATABASES: ipld_hoodi
    volumes:
      - postgres_sepolia_data:/var/lib/postgresql/data
      - ./docker/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blobscan -d ipld_sepolia"]
      interval: 10s
      timeout: 5s
      retries: 5

  ipfs:
    image: ipfs/kubo:latest
    restart: unless-stopped
    environment:
      IPFS_PROFILE: "server,pebbleds"
    volumes:
      - ipfs_sepolia_data:/data/ipfs
    ports:
      - "4001:4001"
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5

  blobscan-ipld:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    volumes:
      - blobscan_sepolia_data:/data
      - blobscan_sepolia_car:/car
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      NETWORK_NAME: sepolia
      BEACON_RPC: "$SEPOLIA_BEACON_RPC"
      BEACON_RATE_LIMIT: "100"  # Adjust based on your RPC provider's limit (Quicknode: 125 req/s, use ~100)
      BEACON_RATE_BURST: "10"
      BEACON_429_BACKOFF: "1s"
      POSTGRES_DSN: "postgres://blobscan:${POSTGRES_PASSWORD}@postgres:5432/ipld_sepolia?sslmode=disable"
      IPFS_API_ADDR: "/dns4/ipfs/tcp/5001"
      DATA_DIR: "/data"
      CAR_DIR: "/car"
      IPFS_SKIP_UPLOAD: "true"
    command: ["run"]

  hoodi:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    volumes:
      - blobscan_hoodi_data:/data
      - blobscan_hoodi_car:/car
    ports:
      - "127.0.0.1:8079:8080"
    environment:
      NETWORK_NAME: hoodi
      BEACON_RPC: "$HOODI_BEACON_RPC"
      BEACON_RATE_LIMIT: "100"  # Adjust based on your RPC provider's limit (Quicknode: 125 req/s, use ~100)
      BEACON_RATE_BURST: "10"
      BEACON_429_BACKOFF: "1s"
      POSTGRES_DSN: "postgres://blobscan:${POSTGRES_PASSWORD}@postgres:5432/ipld_hoodi?sslmode=disable"
      IPFS_API_ADDR: "/dns4/ipfs/tcp/5001"
      DATA_DIR: "/data"
      CAR_DIR: "/car"
      IPFS_SKIP_UPLOAD: "true"
    command: ["run"]

volumes:
  postgres_sepolia_data:
  ipfs_sepolia_data:
  blobscan_sepolia_data:
  blobscan_sepolia_car:
  blobscan_hoodi_data:
  blobscan_hoodi_car:
