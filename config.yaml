network:
  name: mainnet
  beacon_rpc: "http://localhost:5052"
  beacon_timeout: 60s
  beacon_rate_limit: 100  # max requests per second to beacon RPC (set to ~80-90% of provider limit to avoid 429s)
  beacon_rate_burst: 10   # token bucket burst size
  beacon_429_backoff: 1s  # initial backoff duration for rate limit errors (doubles on each 429, capped at 60s)

ipfs:
  api_addr: "/ip4/127.0.0.1/tcp/5001"
  pin_on_add: true
  timeout: 30s
  skip_upload: false  # set to true (or IPFS_SKIP_UPLOAD=true) to compute CIDs without uploading; api_addr not required in that mode
  upload_workers: 16  # parallel block uploads per epoch (or IPFS_UPLOAD_WORKERS=N); raise for remote IPFS, lower if the local daemon saturates

storage:
  data_dir: "/var/lib/blobscan-ipld/mainnet"
  car_dir: "/var/lib/blobscan-ipld/mainnet/car"
  postgres_dsn: ""  # set via POSTGRES_DSN env var or override here

generator:
  hamt_threshold: 5000
  poll_interval: 12s
  start_epoch: 0
  workers: 16          # parallel blob-processing goroutines per epoch (CPU-bound CID hashing); env GENERATOR_WORKERS
  beacon_workers: 16   # parallel slot fetches per epoch (bounded by network.beacon_rate_limit); env GENERATOR_BEACON_WORKERS
  skip_existing_epochs: true
  api_listen: ":8080"  # address for the HTTP push API; remove or leave empty to disable
