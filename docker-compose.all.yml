services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: blobscan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ipld_mainnet
      POSTGRES_MULTIPLE_DATABASES: ipld_sepolia,ipld_hoodi,ipld_gnosis
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blobscan -d ipld_mainnet"]
      interval: 10s
      timeout: 5s
      retries: 5

  ipfs:
    image: ipfs/kubo:latest
    restart: unless-stopped
    environment:
      IPFS_PROFILE: "server,pebbleds"
      GOLOG_LOG_LEVEL: "info"
    volumes:
      - ipfs_data:/data/ipfs
    ports:
      - "4001:4001"
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5

  mainnet:
    profiles: [mainnet]
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    volumes:
      - mainnet_data:/data
      - mainnet_car:/car
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      NETWORK_NAME: mainnet
      BEACON_RPC: "${MAINNET_BEACON_RPC:?MAINNET_BEACON_RPC is required}"
      EXECUTION_RPC: "${MAINNET_EXECUTION_RPC:-}"  # optional: enables EL tx_hash/block enrichment
      BEACON_RATE_LIMIT: "100"  # Adjust to ~80-90% of your RPC provider's req/s limit
      BEACON_RATE_BURST: "32"
      BEACON_429_BACKOFF: "1s"
      BACKFILL_EPOCH_WORKERS: "4"  # parallel epoch builders during backfill (default 4)
      POSTGRES_DSN: "postgres://blobscan:${POSTGRES_PASSWORD}@postgres:5432/ipld_mainnet?sslmode=disable"
      IPFS_API_ADDR: "/dns4/ipfs/tcp/5001"
      DATA_DIR: "/data"
      CAR_DIR: "/car"
    command: ["run"]

  sepolia:
    profiles: [sepolia]
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    volumes:
      - sepolia_data:/data
      - sepolia_car:/car
    ports:
      - "127.0.0.1:8079:8080"
    environment:
      NETWORK_NAME: sepolia
      BEACON_RPC: "${SEPOLIA_BEACON_RPC:?SEPOLIA_BEACON_RPC is required}"
      EXECUTION_RPC: "${SEPOLIA_EXECUTION_RPC:-}"  # optional: enables EL tx_hash/block enrichment
      BEACON_RATE_LIMIT: "100"  # Adjust to ~80-90% of your RPC provider's req/s limit
      BEACON_RATE_BURST: "32"
      BEACON_429_BACKOFF: "1s"
      BACKFILL_EPOCH_WORKERS: "4"  # parallel epoch builders during backfill (default 4)
      POSTGRES_DSN: "postgres://blobscan:${POSTGRES_PASSWORD}@postgres:5432/ipld_sepolia?sslmode=disable"
      IPFS_API_ADDR: "/dns4/ipfs/tcp/5001"
      DATA_DIR: "/data"
      CAR_DIR: "/car"
    command: ["run"]

  hoodi:
    profiles: [hoodi]
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    volumes:
      - hoodi_data:/data
      - hoodi_car:/car
    ports:
      - "127.0.0.1:8078:8080"
    environment:
      NETWORK_NAME: hoodi
      BEACON_RPC: "${HOODI_BEACON_RPC:?HOODI_BEACON_RPC is required}"
      EXECUTION_RPC: "${HOODI_EXECUTION_RPC:-}"  # optional: enables EL tx_hash/block enrichment
      BEACON_RATE_LIMIT: "100"  # Adjust to ~80-90% of your RPC provider's req/s limit
      BEACON_RATE_BURST: "32"
      BEACON_429_BACKOFF: "1s"
      BACKFILL_EPOCH_WORKERS: "4"  # parallel epoch builders during backfill (default 4)
      POSTGRES_DSN: "postgres://blobscan:${POSTGRES_PASSWORD}@postgres:5432/ipld_hoodi?sslmode=disable"
      IPFS_API_ADDR: "/dns4/ipfs/tcp/5001"
      DATA_DIR: "/data"
      CAR_DIR: "/car"
    command: ["run"]

  gnosis:
    profiles: [gnosis]
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    volumes:
      - gnosis_data:/data
      - gnosis_car:/car
    ports:
      - "127.0.0.1:8077:8080"
    environment:
      NETWORK_NAME: gnosis
      BEACON_RPC: "${GNOSIS_BEACON_RPC:?GNOSIS_BEACON_RPC is required}"
      EXECUTION_RPC: "${GNOSIS_EXECUTION_RPC:-}"  # optional: enables EL tx_hash/block enrichment
      BEACON_RATE_LIMIT: "100"  # Adjust to ~80-90% of your RPC provider's req/s limit
      BEACON_RATE_BURST: "32"
      BEACON_429_BACKOFF: "1s"
      BACKFILL_EPOCH_WORKERS: "4"  # parallel epoch builders during backfill (default 4)
      POSTGRES_DSN: "postgres://blobscan:${POSTGRES_PASSWORD}@postgres:5432/ipld_gnosis?sslmode=disable"
      IPFS_API_ADDR: "/dns4/ipfs/tcp/5001"
      DATA_DIR: "/data"
      CAR_DIR: "/car"
    command: ["run"]

volumes:
  postgres_data:
  ipfs_data:
    name: ipfs_shared
  mainnet_data:
  mainnet_car:
  sepolia_data:
  sepolia_car:
  hoodi_data:
  hoodi_car:
  gnosis_data:
  gnosis_car:
